<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
KVK Gurez Budget Management System
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{

--primary:#2563eb;
--success:#16a34a;
--danger:#dc2626;
--bg:#eef4ff;

}

body{

background:var(--bg);

font-family:
Segoe UI,
sans-serif;

padding:20px;

}

.glass{

background:
rgba(255,255,255,.8);

backdrop-filter:
blur(12px);

border-radius:20px;

padding:20px;

margin-bottom:20px;

box-shadow:
0 8px 20px rgba(0,0,0,.08);

}

.card-value{

font-size:30px;

font-weight:700;

}

.chart-box{

height:250px;

}

.table{

font-size:14px;

}

</style>

</head>

<body>

<div class="container-fluid">

<h2 class="mb-4">

💰 KVK Budget Management System

</h2>
<!-- DASHBOARD -->

<div class="row">

<div class="col-md-3">

<div class="glass">

<div>Total Budget</div>

<div
id="totalBudget"
class="card-value">

0

</div>

</div>

</div>

<div class="col-md-3">

<div class="glass">

<div>Total Expenditure</div>

<div
id="totalSpent"
class="card-value">

0

</div>

</div>

</div>

<div class="col-md-3">

<div class="glass">

<div>Balance</div>

<div
id="totalBalance"
class="card-value">

0

</div>

</div>

</div>

<div class="col-md-3">

<div class="glass">

<div>Utilization</div>

<div
id="utilization"
class="card-value">

0%

</div>

</div>

</div>

</div>



<!-- ADD EXPENDITURE -->

<div class="glass">

<h4 class="mb-3">

➕ Add Expenditure

</h4>

<div class="row g-2">

<div class="col-md-2">

<input
type="date"
id="date"
class="form-control">

</div>

<div class="col-md-3">

<select
id="head"
class="form-select">

<option>
Office Building
</option>

<option>
Travelling Allowance
</option>

<option>
Research Expenses
</option>

<option>
Operational Expenses
</option>

<option>
Infrastructure
</option>

<option>
Communication
</option>

<option>
Others
</option>

<option>
Publicity & Exhibitions
</option>

<option>
Miscellaneous
</option>

<option>
Repair & Maintenance
</option>

</select>

</div>

<div class="col-md-2">

<input
type="text"
id="voucher"
class="form-control"
placeholder="Voucher No">

</div>

<div class="col-md-2">

<input
type="number"
id="amount"
class="form-control"
placeholder="Amount">

</div>

<div class="col-md-3">

<input
type="text"
id="remarks"
class="form-control"
placeholder="Remarks">

</div>

</div>

<button
class="btn btn-primary mt-3"
onclick="saveExpense()">

💾 Save Expenditure

</button>

</div>
<!-- BUDGET STATUS -->

<div class="glass">

<h4>

📊 Budget Status

</h4>

<div class="table-responsive">

<table
class="table table-bordered table-hover"
id="budgetTable">

<thead>

<tr>

<th>Code</th>
<th>Head</th>
<th>Budget</th>
<th>Spent</th>
<th>Balance</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>



<!-- CHARTS -->

<div class="row">

<div class="col-md-6">

<div class="glass">

<h5>

🥧 Budget Utilization

</h5>

<div class="chart-box">

<canvas id="pieChart"></canvas>

</div>

</div>

</div>

<div class="col-md-6">

<div class="glass">

<h5>

📈 Head Wise Expenditure

</h5>

<div class="chart-box">

<canvas id="barChart"></canvas>

</div>

</div>

</div>

</div>



<!-- EXPENDITURE REGISTER -->

<div class="glass">

<div
class="d-flex justify-content-between align-items-center">

<h4>

📋 Expenditure Register

</h4>

<input
type="text"
id="search"
class="form-control"
style="max-width:300px"
placeholder="Search">

</div>

<br>

<div class="table-responsive">

<table
class="table table-striped"
id="expenseTable">

<thead>

<tr>

<th>Date</th>
<th>Voucher</th>
<th>Head</th>
<th>Amount</th>
<th>Remarks</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>



<!-- EXPORTS -->

<div class="glass">

<button
class="btn btn-success"
onclick="exportExcel()">

📊 Export Excel

</button>

<button
class="btn btn-danger ms-2"
onclick="exportPDF()">

📄 Export PDF

</button>

</div>
<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxmRlbS0erppMclrMEMyePAQek1oWkKZ-q7YMlV4c9t5jlUNgCkPuU4iqhpl46Y-n0Wew/exec";

let budgetHeads = [];
let expenditures = [];

let pieChart = null;
let barChart = null;


/* SAVE TO GOOGLE FORM */

function saveExpense(){

const date =
document.getElementById("date").value;

const voucher =
document.getElementById("voucher").value;

const head =
document.getElementById("head").value;

const amount =
document.getElementById("amount").value;

const remarks =
document.getElementById("remarks").value;

if(
!date ||
!voucher ||
!amount
){

alert(
"Please fill all fields"
);

return;

}

const formData =
new FormData();

formData.append(
"entry.825311518",
date
);

formData.append(
"entry.947184684",
voucher
);

formData.append(
"entry.1891027260",
head
);

formData.append(
"entry.1930864869",
amount
);

formData.append(
"entry.1184374967",
remarks
);

fetch(
"https://docs.google.com/forms/d/e/1FAIpQLSfR-BWJRAWFQ5zRhH_D9A1f9Df3g2LYE4vC-5TDzR7NSBFkiA/formResponse",
{
method:"POST",
mode:"no-cors",
body:formData
}
);

alert(
"Expense Saved Successfully"
);

document.getElementById("date").value="";
document.getElementById("voucher").value="";
document.getElementById("amount").value="";
document.getElementById("remarks").value="";

setTimeout(
loadData,
5000
);

}



/* LOAD DATA */

async function loadData(){

try{

const response =
await fetch(API_URL);

const data =
await response.json();

budgetHeads =
data.budgetHeads.slice(1);

expenditures =
data.expenditures.slice(1);

renderDashboard();

renderBudgetTable();

renderExpenseTable();

renderCharts();

}

catch(err){

console.log(err);

}

}



/* DASHBOARD */

function renderDashboard(){

let totalBudget = 0;
let totalSpent = 0;

budgetHeads.forEach(x=>{

totalBudget +=
Number(x[2] || 0);

});

expenditures.forEach(x=>{

totalSpent +=
Number(x[4] || 0);

});

const balance =
totalBudget-totalSpent;

document.getElementById(
"totalBudget"
).innerText =
totalBudget.toLocaleString();

document.getElementById(
"totalSpent"
).innerText =
totalSpent.toLocaleString();

document.getElementById(
"totalBalance"
).innerText =
balance.toLocaleString();

document.getElementById(
"utilization"
).innerText =
(
(totalSpent/totalBudget)*100
).toFixed(2)+"%";

}



/* BUDGET TABLE */

function renderBudgetTable(){

const tbody =
document.querySelector(
"#budgetTable tbody"
);

tbody.innerHTML="";

budgetHeads.forEach(head=>{

const spent =
expenditures
.filter(
x=>x[3]===head[1]
)
.reduce(
(a,b)=>
a+Number(b[4]||0),
0
);

const balance =
Number(head[2])-spent;

tbody.innerHTML += `

<tr>

<td>${head[0]}</td>

<td>${head[1]}</td>

<td>
${Number(head[2])
.toLocaleString()}
</td>

<td>
${spent.toLocaleString()}
</td>

<td>
${balance.toLocaleString()}
</td>

</tr>

`;

});

}
/* REGISTER */

function renderExpenseTable(){

const tbody =
document.querySelector(
"#expenseTable tbody"
);

tbody.innerHTML = "";

expenditures.forEach(row=>{

tbody.innerHTML += `

<tr>

<td>${row[1] || ""}</td>

<td>${row[2] || ""}</td>

<td>${row[3] || ""}</td>

<td>${row[4] || ""}</td>

<td>${row[5] || ""}</td>

</tr>

`;

});

}



/* SEARCH */

document.addEventListener(
"input",
function(e){

if(
e.target.id==="search"
){

const value =
e.target.value.toLowerCase();

document
.querySelectorAll(
"#expenseTable tbody tr"
)
.forEach(row=>{

row.style.display =
row.innerText
.toLowerCase()
.includes(value)
? ""
: "none";

});

}

});



/* CHARTS */

function renderCharts(){

let totalBudget = 0;
let totalSpent = 0;

budgetHeads.forEach(x=>{

totalBudget +=
Number(x[2] || 0);

});

expenditures.forEach(x=>{

totalSpent +=
Number(x[4] || 0);

});


if(pieChart)
pieChart.destroy();

pieChart =
new Chart(

document.getElementById(
"pieChart"
),

{

type:"pie",

data:{

labels:[
"Spent",
"Balance"
],

datasets:[{

data:[

totalSpent,

totalBudget-totalSpent

]

}]

},

options:{

responsive:true,

maintainAspectRatio:false

}

}

);



const headNames =
budgetHeads.map(
x=>x[1]
);

const headSpent =
budgetHeads.map(head=>{

return expenditures

.filter(
x=>x[3]===head[1]
)

.reduce(
(a,b)=>
a+Number(b[4] || 0),
0
);

});


if(barChart)
barChart.destroy();

barChart =
new Chart(

document.getElementById(
"barChart"
),

{

type:"bar",

data:{

labels:
headNames,

datasets:[{

label:
"Expenditure",

data:
headSpent

}]

},

options:{

responsive:true,

maintainAspectRatio:false

}

}

);

}



/* EXCEL EXPORT */

function exportExcel(){

const ws =
XLSX.utils.table_to_sheet(

document.getElementById(
"expenseTable"
)

);

const wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(

wb,

ws,

"Expenditure"

);

XLSX.writeFile(

wb,

"KVK_Expenditure.xlsx"

);

}



/* PDF EXPORT */

async function exportPDF(){

const { jsPDF } =
window.jspdf;

const doc =
new jsPDF();

doc.text(

"KVK Budget Report",

15,

15

);

let y = 30;

expenditures.forEach(x=>{

doc.text(

`${x[1]} | ${x[2]} | ${x[3]} | ${x[4]}`,

10,

y

);

y += 8;

});

doc.save(
"KVK_Report.pdf"
);

}



/* START */

loadData();

/* refresh every 10 sec */

setInterval(
loadData,
10000
);


<footer
class="glass text-center">

<h6>

KVK Budget Management System

</h6>

<p
style="
margin:0;
font-size:13px;
color:#666;">

Developed & Maintained by

<strong>
Tanzeer Khan
</strong>

</p>

</footer>

</body>

</html>
</body>

</html>
