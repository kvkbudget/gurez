<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
KVK Budget Management System
</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{

--primary:#2563eb;
--success:#16a34a;
--danger:#dc2626;
--bg:#f3f6fb;

}

body{

background:var(--bg);

font-family:
Segoe UI,
sans-serif;

padding:20px;

}

.glass{

background:
rgba(255,255,255,.7);

backdrop-filter:
blur(10px);

border-radius:20px;

box-shadow:
0 8px 20px rgba(0,0,0,.08);

padding:20px;

margin-bottom:20px;

}

.card-value{

font-size:28px;
font-weight:700;

}

.table{

font-size:14px;

}

canvas{

max-height:250px;

}

h2{

font-weight:700;

margin-bottom:20px;

}

</style>

</head>

<body>

<div class="container-fluid">

<h2>
💰 KVK Budget Management System
</h2>

<div class="row">

<div class="col-md-3">

<div class="glass">

<div>Total Budget</div>

<div
class="card-value"
id="totalBudget">

0

</div>

</div>

</div>

<div class="col-md-3">

<div class="glass">

<div>Total Expenditure</div>

<div
class="card-value"
id="totalSpent">

0

</div>

</div>

</div>

<div class="col-md-3">

<div class="glass">

<div>Balance</div>

<div
class="card-value"
id="totalBalance">

0

</div>

</div>

</div>

<div class="col-md-3">

<div class="glass">

<div>Utilization</div>

<div
class="card-value"
id="utilization">

0%

</div>

</div>

</div>

</div>
<!-- ADD EXPENDITURE -->

<div class="glass">

<h4 class="mb-3">
Add Expenditure
</h4>

<div class="row g-2">

<div class="col-md-2">
<input
type="date"
id="date"
class="form-control">
</div>

<div class="col-md-3">
<select
id="head"
class="form-select">
</select>
</div>

<div class="col-md-2">
<input
type="text"
id="voucher"
class="form-control"
placeholder="Voucher No">
</div>

<div class="col-md-2">
<input
type="number"
id="amount"
class="form-control"
placeholder="Amount">
</div>

<div class="col-md-3">
<input
type="text"
id="remarks"
class="form-control"
placeholder="Remarks">
</div>

</div>

<button
class="btn btn-primary mt-3"
onclick="saveExpense()">

Save Expenditure

</button>

</div>


<!-- BUDGET STATUS -->

<div class="glass">

<h4>
Budget Status
</h4>

<div class="table-responsive">

<table
class="table table-hover table-bordered"
id="budgetTable">

<thead>

<tr>

<th>Code</th>
<th>Head</th>
<th>Budget</th>
<th>Spent</th>
<th>Balance</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>


<!-- CHARTS -->

<div class="row">

<div class="col-md-6">

<div class="glass">

<h5>
Budget Utilization
</h5>

<canvas id="pieChart"></canvas>

</div>

</div>

<div class="col-md-6">

<div class="glass">

<h5>
Head Wise Budget
</h5>

<canvas id="barChart"></canvas>

</div>

</div>

</div>


<!-- REGISTER -->

<div class="glass">

<div
class="d-flex justify-content-between align-items-center">

<h4>
Expenditure Register
</h4>

<input
type="text"
id="search"
class="form-control"
style="max-width:300px"
placeholder="Search">

</div>

<br>

<div class="table-responsive">

<table
class="table table-striped"
id="expenseTable">

<thead>

<tr>

<th>Date</th>
<th>Voucher</th>
<th>Head</th>
<th>Amount</th>
<th>Remarks</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>


<!-- EXPORT -->

<div class="glass">

<button
class="btn btn-success"
onclick="exportExcel()">

Export Excel

</button>

<button
class="btn btn-danger ms-2"
onclick="exportPDF()">

Export PDF

</button>

</div>


<!-- HIDDEN FRAME -->

<iframe
name="hiddenFrame"
style="display:none">
</iframe>
<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxmRlbS0erppMclrMEMyePAQek1oWkKZ-q7YMlV4c9t5jlUNgCkPuU4iqhpl46Y-n0Wew/exec";

let budgetHeads = [];
let expenditures = [];

let pieChart = null;
let barChart = null;

/* LOAD DATA */

async function loadData(){

  try{

    const response =
      await fetch(API_URL);

    const data =
      await response.json();

    budgetHeads =
      data.budgetHeads.slice(1);

    expenditures =
      data.expenditures.slice(1);

    populateHeads();

    renderBudgetTable();

    renderExpenseTable();

    renderDashboard();

    renderCharts();

  }

  catch(err){

    console.log(err);

  }

}


/* HEAD DROPDOWN */

function populateHeads(){

  const select =
    document.getElementById("head");

  select.innerHTML = "";

  budgetHeads.forEach(head=>{

    const option =
      document.createElement("option");

    option.value =
      head[1];

    option.textContent =
      head[1];

    select.appendChild(option);

  });

}


/* SAVE EXPENSE */

function saveExpense(){

  const form =
    document.createElement("form");

  form.method = "POST";

  form.action = API_URL;

  form.target = "hiddenFrame";

  const fields = {

    date:
      document.getElementById("date").value,

    voucher:
      document.getElementById("voucher").value,

    head:
      document.getElementById("head").value,

    amount:
      document.getElementById("amount").value,

    remarks:
      document.getElementById("remarks").value

  };

  for(const key in fields){

    const input =
      document.createElement("input");

    input.type = "hidden";

    input.name = key;

    input.value = fields[key];

    form.appendChild(input);

  }

  document.body.appendChild(form);

  form.submit();

  alert("Expense Saved");

  setTimeout(loadData,3000);

}


/* DASHBOARD */

function renderDashboard(){

  let totalBudget = 0;
  let totalSpent = 0;

  budgetHeads.forEach(h=>{

    totalBudget +=
      Number(h[2]);

  });

  expenditures.forEach(e=>{

    totalSpent +=
      Number(e[3]);

  });

  let balance =
    totalBudget - totalSpent;

  document.getElementById(
    "totalBudget"
  ).innerText =
    totalBudget.toLocaleString();

  document.getElementById(
    "totalSpent"
  ).innerText =
    totalSpent.toLocaleString();

  document.getElementById(
    "totalBalance"
  ).innerText =
    balance.toLocaleString();

  document.getElementById(
    "utilization"
  ).innerText =
    ((totalSpent/totalBudget)*100)
    .toFixed(2)+"%";

}


/* BUDGET TABLE */

function renderBudgetTable(){

  const tbody =
    document.querySelector(
      "#budgetTable tbody"
    );

  tbody.innerHTML = "";

  budgetHeads.forEach(head=>{

    let spent =
      expenditures
      .filter(
        x=>x[2]===head[1]
      )
      .reduce(
        (a,b)=>
        a+Number(b[3]),
        0
      );

    let balance =
      Number(head[2]) - spent;

    tbody.innerHTML += `
      <tr>
        <td>${head[0]}</td>
        <td>${head[1]}</td>
        <td>${Number(head[2]).toLocaleString()}</td>
        <td>${spent.toLocaleString()}</td>
        <td>${balance.toLocaleString()}</td>
      </tr>
    `;

  });

}


/* REGISTER */

function renderExpenseTable(){

  const tbody =
    document.querySelector(
      "#expenseTable tbody"
    );

  tbody.innerHTML = "";

  expenditures.forEach(row=>{

    tbody.innerHTML += `
      <tr>
        <td>${row[0]}</td>
        <td>${row[1]}</td>
        <td>${row[2]}</td>
        <td>${row[3]}</td>
        <td>${row[4]}</td>
      </tr>
    `;

  });

}


/* SEARCH */

document.addEventListener(
"input",
function(e){

if(
e.target.id==="search"
){

const value =
e.target.value.toLowerCase();

document
.querySelectorAll(
"#expenseTable tbody tr"
)
.forEach(row=>{

row.style.display =
row.innerText
.toLowerCase()
.includes(value)
? ""
: "none";

});

}

});


/* PIE CHART */

function renderCharts(){

  let totalBudget = 0;
  let totalSpent = 0;

  budgetHeads.forEach(x=>{

    totalBudget +=
      Number(x[2]);

  });

  expenditures.forEach(x=>{

    totalSpent +=
      Number(x[3]);

  });

  if(pieChart)
    pieChart.destroy();

  pieChart =
    new Chart(
      document.getElementById(
        "pieChart"
      ),
      {
        type:"pie",
        data:{
          labels:[
            "Spent",
            "Balance"
          ],
          datasets:[{
            data:[
              totalSpent,
              totalBudget-totalSpent
            ]
          }]
        }
      }
    );


  if(barChart)
    barChart.destroy();

  barChart =
    new Chart(
      document.getElementById(
        "barChart"
      ),
      {
        type:"bar",
        data:{
          labels:
            budgetHeads.map(
              x=>x[0]
            ),
          datasets:[{
            label:"Budget",
            data:
              budgetHeads.map(
                x=>Number(x[2])
              )
          }]
        },
        options:{
          responsive:true,
          maintainAspectRatio:false
        }
      }
    );

}


/* EXCEL */

function exportExcel(){

  let ws =
    XLSX.utils.table_to_sheet(
      document.getElementById(
        "expenseTable"
      )
    );

  let wb =
    XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(
    wb,
    ws,
    "Expenditure"
  );

  XLSX.writeFile(
    wb,
    "KVK_Report.xlsx"
  );

}


/* PDF */

async function exportPDF(){

  const { jsPDF } =
    window.jspdf;

  const doc =
    new jsPDF();

  doc.text(
    "KVK Budget Report",
    20,
    20
  );

  let y = 40;

  expenditures.forEach(x=>{

    doc.text(
      `${x[0]} | ${x[1]} | ${x[2]} | ${x[3]}`,
      10,
      y
    );

    y += 8;

  });

  doc.save(
    "KVK_Report.pdf"
  );

}


/* START */

loadData();

setInterval(
loadData,
30000
);

</script>

</body>
</html>
