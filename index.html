<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KVK Budget Manager</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{background:#f4f6f9;padding:20px}
.card{box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:15px}
</style>
</head>
<body>
<div class="container-fluid">
<h2>KVK Budget Management System</h2>

<div class="row">
<div class="col-md-3"><div class="card p-3"><h6>Total Budget</h6><h3 id="totalBudget">0</h3></div></div>
<div class="col-md-3"><div class="card p-3"><h6>Total Spent</h6><h3 id="totalSpent">0</h3></div></div>
<div class="col-md-3"><div class="card p-3"><h6>Balance</h6><h3 id="totalBalance">0</h3></div></div>
<div class="col-md-3"><div class="card p-3"><h6>Utilization</h6><h3 id="utilization">0%</h3></div></div>
</div>

<div class="card p-3">
<h4>Add Expenditure</h4>
<div class="row">
<div class="col-md-2"><input type="date" id="date" class="form-control"></div>
<div class="col-md-3"><select id="head" class="form-control"></select></div>
<div class="col-md-2"><input type="text" id="voucher" class="form-control" placeholder="Voucher"></div>
<div class="col-md-2"><input type="number" id="amount" class="form-control" placeholder="Amount"></div>
<div class="col-md-3"><input type="text" id="remarks" class="form-control" placeholder="Remarks"></div>
</div>
<button class="btn btn-primary mt-3" onclick="saveExpense()">Save Expenditure</button>
</div>

<div class="card p-3">
<h4>Budget Status</h4>
<table class="table table-bordered" id="budgetTable">
<thead><tr><th>Code</th><th>Head</th><th>Budget</th><th>Spent</th><th>Balance</th></tr></thead>
<tbody></tbody>
</table>
</div>

<div class="card p-3">
<h4>Expenditure Register</h4>
<input type="text" id="search" class="form-control mb-2" placeholder="Search">
<table class="table table-striped" id="expenseTable">
<thead><tr><th>Date</th><th>Voucher</th><th>Head</th><th>Amount</th><th>Remarks</th></tr></thead>
<tbody></tbody>
</table>
</div>

<div class="row">
<div class="col-md-6"><div class="card p-3"><canvas id="pieChart"></canvas></div></div>
<div class="col-md-6"><div class="card p-3"><canvas id="barChart"></canvas></div></div>
</div>

<div class="card p-3">
<button class="btn btn-success" onclick="exportExcel()">Export Excel</button>
<button class="btn btn-danger" onclick="exportPDF()">Export PDF</button>
</div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxmRlbS0erppMclrMEMyePAQek1oWkKZ-q7YMlV4c9t5jlUNgCkPuU4iqhpl46Y-n0Wew/exec";
let budgetHeads=[], expenditures=[], pieChart, barChart;

async function loadData(){
 const r=await fetch(API_URL);
 const d=await r.json();
 budgetHeads=d.budgetHeads.slice(1);
 expenditures=d.expenditures.slice(1);
 fillHeads(); renderBudget(); renderExpenses(); renderCharts();
}

function fillHeads(){
 let s=document.getElementById('head');
 s.innerHTML='';
 budgetHeads.forEach(h=>{
   let o=document.createElement('option');
   o.value=h[1]; o.textContent=h[1];
   s.appendChild(o);
 });
}

async function saveExpense(){
 const payload={
  action:"addExpense",
  date:document.getElementById('date').value,
  voucher:document.getElementById('voucher').value,
  head:document.getElementById('head').value,
  amount:Number(document.getElementById('amount').value),
  remarks:document.getElementById('remarks').value
 };
 await fetch(API_URL,{method:'POST',body:JSON.stringify(payload)});
 alert("Saved");
 loadData();
}

function renderBudget(){
 let tb=document.querySelector('#budgetTable tbody');
 tb.innerHTML='';
 let totalBudget=0,totalSpent=0;
 budgetHeads.forEach(h=>{
   let spent=expenditures.filter(x=>x[2]===h[1]).reduce((a,b)=>a+Number(b[3]),0);
   let bal=Number(h[2])-spent;
   tb.innerHTML+=`<tr><td>${h[0]}</td><td>${h[1]}</td><td>${h[2]}</td><td>${spent}</td><td>${bal}</td></tr>`;
   totalBudget+=Number(h[2]); totalSpent+=spent;
 });
 document.getElementById('totalBudget').innerText=totalBudget.toLocaleString();
 document.getElementById('totalSpent').innerText=totalSpent.toLocaleString();
 document.getElementById('totalBalance').innerText=(totalBudget-totalSpent).toLocaleString();
 document.getElementById('utilization').innerText=((totalSpent/totalBudget)*100).toFixed(2)+'%';
}

function renderExpenses(){
 let tb=document.querySelector('#expenseTable tbody');
 tb.innerHTML='';
 expenditures.forEach(e=>{
  tb.innerHTML+=`<tr><td>${e[0]}</td><td>${e[1]}</td><td>${e[2]}</td><td>${e[3]}</td><td>${e[4]}</td></tr>`;
 });
}

function renderCharts(){
 let totalBudget=budgetHeads.reduce((s,x)=>s+Number(x[2]),0);
 let totalSpent=expenditures.reduce((s,x)=>s+Number(x[3]),0);

 if(pieChart) pieChart.destroy();
 pieChart=new Chart(document.getElementById('pieChart'),{
 type:'pie',
 data:{labels:['Spent','Balance'],datasets:[{data:[totalSpent,totalBudget-totalSpent]}]}
 });

 if(barChart) barChart.destroy();
 barChart=new Chart(document.getElementById('barChart'),{
 type:'bar',
 data:{
 labels:budgetHeads.map(x=>x[1]),
 datasets:[{label:'Budget',data:budgetHeads.map(x=>Number(x[2]))}]
 }
 });
}

document.getElementById('search').addEventListener('keyup',function(){
 let v=this.value.toLowerCase();
 document.querySelectorAll('#expenseTable tbody tr').forEach(r=>{
   r.style.display=r.innerText.toLowerCase().includes(v)?'':'none';
 });
});

function exportExcel(){
 let ws=XLSX.utils.table_to_sheet(document.getElementById('expenseTable'));
 let wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,'Expenditure');
 XLSX.writeFile(wb,'KVK_Report.xlsx');
}

async function exportPDF(){
 const {jsPDF}=window.jspdf;
 const doc=new jsPDF();
 doc.text('KVK Expenditure Report',20,20);
 let y=40;
 expenditures.forEach(e=>{doc.text(`${e[0]} | ${e[1]} | ${e[2]} | ${e[3]}`,10,y); y+=8;});
 doc.save('KVK_Report.pdf');
}

loadData();
setInterval(loadData,30000);
</script>
</body>
</html>
